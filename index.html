<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Can my car make it over this slope?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>Can my car make it over this slope?</h1>
  <p>Enter your car's geometry and the ramp profile to check all four critical clearance points.</p>
</header>

<div class="presets">
  <span>Presets:</span>
  <button onclick="loadPreset('ramp_15')">15% ramp</button>
  <button onclick="loadPreset('ramp_20')">20% ramp</button>
  <button onclick="loadPreset('bump_100')">100mm bump</button>
  <button onclick="loadPreset('bump_150')">150mm bump</button>
</div>

<div class="main">
  <aside class="sidebar">
    <fieldset>
      <legend>Car geometry</legend>

      <div class="field">
        <label>Wheelbase<small>front axle → rear axle</small></label>
        <input type="number" id="wheelbase" value="2875" min="1000" max="5000" step="5" />
        <span class="unit">mm</span>
      </div>
      <div class="field">
        <label>Ground clearance<small>lowest chassis point</small></label>
        <input type="number" id="clearance" value="138" min="50" max="500" step="1" />
        <span class="unit">mm</span>
      </div>
      <div class="field">
        <label>Front overhang<small>front axle → front bumper</small></label>
        <input type="number" id="frontOverhang" value="840" min="100" max="2000" step="5" />
        <span class="unit">mm</span>
      </div>
      <div class="field">
        <label>Rear overhang<small>rear axle → rear bumper</small></label>
        <input type="number" id="rearOverhang" value="978" min="100" max="2000" step="5" />
        <span class="unit">mm</span>
      </div>
      <div class="field">
        <label>Approach angle<small>front bumper clearance angle</small></label>
        <input type="number" id="approachAngle" value="15" min="1" max="45" step="0.5" />
        <span class="unit">°</span>
      </div>
      <div class="field">
        <label>Departure angle<small>rear bumper clearance angle</small></label>
        <input type="number" id="departureAngle" value="16" min="1" max="45" step="0.5" />
        <span class="unit">°</span>
      </div>
      <div class="field">
        <label>Tire radius<small>wheel outer radius</small></label>
        <input type="number" id="tireRadius" value="340" min="200" max="600" step="5" />
        <span class="unit">mm</span>
      </div>
    </fieldset>

    <fieldset>
      <legend id="slopeLegend">Ramp obstacle</legend>

      <div class="field mode-toggle">
        <label>Mode</label>
        <span class="toggle-group">
          <input type="radio" name="mode" id="modeRamp" value="ramp" checked />
          <label for="modeRamp">Ramp</label>
          <input type="radio" name="mode" id="modeBump" value="bump" />
          <label for="modeBump">Bump</label>
        </span>
      </div>
      <div class="field">
        <label>Slope angle<small class="bump-only" style="display:none">rise face</small></label>
        <input type="number" id="rampAngle" value="8.53" min="1" max="30" step="0.1" />
        <span class="unit">°</span>
      </div>
      <div class="field">
        <label>Slope grade<small class="bump-only" style="display:none">rise face — auto-calculates angle</small><small class="ramp-only"> (auto-calculates angle)</small></label>
        <input type="number" id="rampGrade" value="15" min="1" max="50" step="0.5" />
        <span class="unit">%</span>
      </div>
      <div class="field bump-only" style="display:none">
        <label>Fall angle<small>rear face of bump</small></label>
        <input type="number" id="rampAngleFall" value="8.53" min="1" max="30" step="0.1" />
        <span class="unit">°</span>
      </div>
      <div class="field bump-only" style="display:none">
        <label>Fall grade<small>rear face — auto-calculates angle</small></label>
        <input type="number" id="rampGradeFall" value="15" min="1" max="50" step="0.5" />
        <span class="unit">%</span>
      </div>
      <div class="field bump-only" style="display:none">
        <label>Bump height<small>peak height above ground</small></label>
        <input type="number" id="bumpHeight" value="100" min="20" max="500" step="5" />
        <span class="unit">mm</span>
      </div>
      <div class="field bump-only" style="display:none">
        <label>Bump width<small>flat top width</small></label>
        <input type="number" id="bumpWidth" value="1000" min="100" max="5000" step="50" />
        <span class="unit">mm</span>
      </div>
    </fieldset>
  </aside>

  <div class="right-panel">
    <div id="canvas-wrap">
      <canvas id="scene" width="900" height="420"></canvas>
    </div>
    <div id="derived-specs">
      <span class="derived-label">Breakover angle</span>
      <span class="derived-value" id="derived-breakover"
        data-tip="Computed from car geometry: 2 × arctan(2h / L), where h = ground clearance and L = wheelbase. This is the steepest symmetric crest the belly can straddle without scraping.">—</span>
    </div>
    <div id="results">
      <span class="verdict" id="verdict">—</span>
      <span class="check-item" id="chk-approach"
        data-tip="Approach: front bumper clearance above the obstacle face when the front tires reach the transition point.">Front bumper</span>
      <span class="check-item" id="chk-breakover-top"
        data-tip="Top breakover: belly clearance at the crest — the car is bridging the obstacle with the rear axle still on the approach side.">Belly (top)</span>
      <span class="check-item" id="chk-breakover-bot"
        data-tip="Bottom breakover: belly clearance at the exit transition — the car has crossed and the rear axle is still on the obstacle.">Belly (bottom)</span>
      <span class="check-item" id="chk-departure"
        data-tip="Departure: rear bumper clearance above the obstacle face as the rear tires cross the exit transition.">Rear bumper</span>
    </div>
  </div>
</div>

<div id="tooltip" class="tooltip"></div>

<script src="script.js"></script>
</body>
</html>
